<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="0" height="0" style="display:none;"><symbol viewBox="0 0 24 24" id="webibis-icons-home">
  <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
  <polyline points="9 22 9 12 15 12 15 22"></polyline>
</symbol><symbol viewBox="0 0 220 220" id="webibis-icons-user">
  
  <!-- Background Circle -->
  <circle cx="110" cy="110" r="100" fill="url(#bgGradient)"></circle>

  <!-- Shadow -->
  <ellipse cx="110" cy="185" rx="45" ry="10" fill="#00000020"></ellipse>

  <!-- Head -->
  <circle cx="110" cy="82" r="32" fill="white"></circle>

  <!-- Body -->
  <path d="M58 165C58 136 81 118 110 118C139 118 162 136 162 165V170H58V165Z" fill="white"></path>

  <!-- Glow Ring -->
  <circle cx="110" cy="110" r="96" stroke="url(#ringGradient)" stroke-width="4"></circle>

  <defs>
    <!-- Main Background Gradient -->
    <lineargradient id="bgGradient" x1="30" y1="20" x2="190" y2="200" gradientunits="userSpaceOnUse">
      <stop stop-color="#4F46E5"></stop>
      <stop offset="1" stop-color="#06B6D4"></stop>
    </lineargradient>

    <!-- Outer Ring Gradient -->
    <lineargradient id="ringGradient" x1="20" y1="20" x2="200" y2="200" gradientunits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.8"></stop>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.1"></stop>
    </lineargradient>
  </defs>

</symbol></svg>