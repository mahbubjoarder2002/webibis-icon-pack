<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webibis Icons | Premium Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://webibis-icon-pack.onrender.com/dist/webibis-icons.css">
    <style>
        :root { 
            --primary: #4f46e5; 
            --bg: #fdfdfd; 
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-dark); margin: 0; }
        
        /* Header */
        header { background: #0f172a; color: white; padding: 80px 20px; text-align: center; }
        header h1 { font-size: 2.5rem; margin-bottom: 15px; }
        .cdn-box { max-width: 600px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 50px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .cdn-box code { flex-grow: 1; color: #94a3b8; font-size: 0.8rem; overflow-x: auto; margin: 0 10px; }
        
        /* Search */
        .search-container { max-width: 600px; margin: -25px auto 40px; padding: 0 20px; }
        #searchBar { width: 100%; padding: 16px 24px; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 20px rgba(0,0,0,0.05); font-size: 1rem; outline: none; transition: 0.3s; }
        #searchBar:focus { border-color: var(--primary); }

        /* Grid */
        .icons-grid { max-width: 1000px; margin: 0 auto 50px; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 16px; }
        .icon-card { background: var(--card-bg); border-radius: 16px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #f1f5f9; }
        .icon-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.06); border-color: #e2e8f0; }
        .icon-img-box img { width: 32px; height: 32px; margin-bottom: 8px; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 40px; border-radius: 24px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2); }
        .btn-copy { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

<header>
    <h1>Webibis Icon Library</h1>
    <div class="cdn-box">
        <code>&lt;link rel="stylesheet" href="https://webibis-icon-pack.onrender.com/dist/webibis-icons.css"&gt;</code>
        <button class="btn-copy" style="padding: 6px 15px; font-size: 0.8rem;" onclick="copyGlobal(this)">Copy</button>
    </div>
</header>

<div class="search-container">
    <input type="text" id="searchBar" placeholder="🔍 Search your icons..." oninput="filterIcons()">
</div>

<div class="icons-grid" id="iconsGrid"></div>

<div class="modal" id="codeModal">
    <div class="modal-content">
        <div id="previewIcon" style="font-size: 3rem; color: var(--primary); margin-bottom: 10px;"></div>
        <h3 id="modalIconName" style="margin: 5px 0;"></h3>
        <p style="color: var(--text-light); font-size: 0.9rem;">Copy HTML code:</p>
        <div style="background: #f1f5f9; padding: 12px; border-radius: 8px; font-family: monospace;" id="codeToCopy"></div>
        <button class="btn-copy" onclick="copyTag(this)">Copy HTML Tag</button>
        <button style="background:transparent; border:none; color:var(--text-light); margin-top:15px; cursor:pointer;" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
    let allIcons = [];
    const SERVER_URL = 'https://webibis-icon-pack.onrender.com';

    async function loadIcons() {
        const res = await fetch(`${SERVER_URL}/api/icons/all`);
        const json = await res.json();
        allIcons = json.data;
        displayIcons(allIcons);
    }

    function displayIcons(icons) {
        const grid = document.getElementById('iconsGrid');
        grid.innerHTML = icons.map(i => `
            <div class="icon-card" onclick="openModal('${i.icon_name}', 'webibis-icons-${i.icon_name.toLowerCase().replace(/\s+/g, '-')}')">
                <div class="icon-img-box"><img src="${SERVER_URL}/api/icons/svg/${i.id}" alt="${i.icon_name}"></div>
                <small style="font-weight:600; color:var(--text-light)">${i.icon_name}</small>
            </div>
        `).join('');
    }

    function openModal(name, className) {
        document.getElementById('modalIconName').innerText = name;
        document.getElementById('previewIcon').innerHTML = `<i class="${className}"></i>`;
        document.getElementById('codeToCopy').innerText = `<i class="${className}"></i>`;
        document.getElementById('codeModal').style.display = 'flex';
    }

    function copyGlobal(btn) {
        const text = document.querySelector('.cdn-box code').innerText;
        navigator.clipboard.writeText(text);
        btn.innerText = "Copied!";
        setTimeout(() => btn.innerText = "Copy", 2000);
    }

    function copyTag(btn) {
        const text = document.getElementById('codeToCopy').innerText;
        navigator.clipboard.writeText(text);
        btn.innerText = "Copied!";
        btn.style.background = "#22c55e";
        setTimeout(() => { btn.innerText = "Copy HTML Tag"; btn.style.background = "#4f46e5"; }, 2000);
    }

    function closeModal() { document.getElementById('codeModal').style.display = 'none'; }
    function filterIcons() {
        const q = document.getElementById('searchBar').value.toLowerCase();
        displayIcons(allIcons.filter(i => i.icon_name.toLowerCase().includes(q)));
    }
    loadIcons();
</script>
</body>
</html>
