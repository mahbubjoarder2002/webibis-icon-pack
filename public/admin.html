<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webibis Icons - Admin Panel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; background: #fff; margin: 30px auto; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        input[type="text"], select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 120px; font-family: monospace; }
        button { background: #1abc9c; color: #fff; border: none; padding: 12px 20px; border-radius: 4px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #16a085; }
        #message { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; font-size: 14px; text-align: center; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block !important; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>Upload New Icon 🚀</h2>
    <form id="iconForm">
        <div class="form-group">
            <label for="icon_name">Icon Name (e.g., home, user, bell)</label>
            <input type="text" id="icon_name" placeholder="Enter icon name..." required>
        </div>
        
        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" required>
                <option value="">Select Category</option>
                <option value="Interface">Interface</option>
                <option value="Business">Business</option>
                <option value="Communication">Communication</option>
                <option value="Media">Media</option>
                <option value="Design">Design</option>
            </select>
        </div>

        <div class="form-group">
            <label for="style">Style</label>
            <select id="style">
                <option value="regular">Regular (Line)</option>
                <option value="solid">Solid (Filled)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="tags">Tags / Keywords (Comma separated)</label>
            <input type="text" id="tags" placeholder="e.g., house, building, main">
        </div>

        <div class="form-group">
            <label for="svg_code">Raw SVG Code</label>
            <textarea id="svg_code" placeholder="Paste your <svg>...</svg> code here" required></textarea>
        </div>

        <button type="submit">Save Icon to Database</button>
    </form>
    
    <div id="message"></div>
</div>

<script>
    const SERVER_URL = 'https://webibis-icon-pack.onrender.com';

    document.getElementById('iconForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const msgDiv = document.getElementById('message');
        msgDiv.style.display = 'none';
        msgDiv.className = ''; // রিসেট ক্লাস

        const data = {
            icon_name: document.getElementById('icon_name').value.trim().toLowerCase(),
            category: document.getElementById('category').value,
            style: document.getElementById('style').value,
            tags: document.getElementById('tags').value.trim(),
            svg_code: document.getElementById('svg_code').value.trim()
        };

        try {
            const response = await fetch(`${SERVER_URL}/api/icons/add`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (result.success) {
                msgDiv.className = 'success';
                msgDiv.innerText = result.message || 'Icon uploaded successfully! 🎉';
                document.getElementById('iconForm').reset();
            } else {
                msgDiv.className = 'error';
                msgDiv.innerText = result.message || 'Failed to upload icon!';
            }
        } catch (error) {
            console.error('Upload error:', error);
            msgDiv.className = 'error';
            msgDiv.innerText = 'Failed to connect to the server!';
        }
    });
</script>
</body>
</html>
