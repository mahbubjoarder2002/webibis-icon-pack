<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webibis Icons - Admin Dashboard</title>
    <style>
        body .nav-menu { background: #34495e; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; }
.nav-menu a { color: white; text-decoration: none; font-weight: bold; padding: 5px 10px; border-radius: 4px; }
.nav-menu a:hover { background: #1abc9c; }
.nav-menu a.active { background: #1abc9c; }



        { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; padding: 20px; color: #333; }
        .container { max-width: 800px; background: #fff; margin: 20px auto; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .form-group { margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #1abc9c; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        button.delete-btn { background: #e74c3c; width: auto; padding: 5px 10px; }
        #message { margin: 15px 0; padding: 10px; display: none; text-align: center; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; display: block !important; }
        .error { background: #f8d7da; color: #721c24; display: block !important; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; vertical-align: middle; }
        .icon-preview { width: 40px; height: 40px; }
        #searchBox { margin-bottom: 20px; padding: 12px; border: 2px solid #1abc9c; border-radius: 4px; width: 100%; }
        .stats-link { background: #34495e; color: #fff; padding: 8px 15px; text-decoration: none; border-radius: 4px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
<div class="nav-menu">
    <a href="admin.html" id="nav-dashboard">Dashboard</a>
    <a href="stats.html" id="nav-stats">Statistics</a>
    <a href="manage-icons.html" id="nav-manage">Manage Icons</a>
</div>

    
    <h2>Upload New Icon 🚀</h2>
    <form id="iconForm">
        <div class="form-group"><input type="text" id="icon_name" placeholder="Icon Name" required></div>
        <div class="form-group">
            <select id="category" required>
                <option value="">Select Category</option>
                <option value="Interface">Interface</option>
                <option value="Business">Business</option>
            </select>
        </div>
        <div class="form-group"><input type="text" id="tags" placeholder="Tags (comma separated, e.g., web, menu, nav)"></div>
        <div class="form-group"><textarea id="svg_code" placeholder="Paste SVG Code" required></textarea></div>
        <button type="submit">Save Icon</button>
    </form>
    <div id="message"></div>
</div>

<script>
    const SERVER_URL = 'https://webibis-icon-pack.onrender.com';

    // Current page highlight korar jonyo
const path = window.location.pathname;
if (path.includes('admin.html')) document.getElementById('nav-dashboard').classList.add('active');
else if (path.includes('stats.html')) document.getElementById('nav-stats').classList.add('active');
else if (path.includes('manage-icons.html')) document.getElementById('nav-manage').classList.add('active');

    document.getElementById('iconForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            icon_name: document.getElementById('icon_name').value.trim().toLowerCase(),
            category: document.getElementById('category').value,
            tags: document.getElementById('tags').value.trim(),
            svg_code: document.getElementById('svg_code').value.trim()
        };
        const response = await fetch(`${SERVER_URL}/api/icons/add`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const result = await response.json();
        const msg = document.getElementById('message');
        msg.className = response.ok ? 'success' : 'error';
        msg.innerText = result.message;
        if(response.ok) { document.getElementById('iconForm').reset(); loadIcons(); }
    });

    loadIcons();
</script>
</body>
</html>
