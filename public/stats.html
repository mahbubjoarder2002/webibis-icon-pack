<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Statistics - Admin</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPOBUWomscG6ZV-lvPx-cOctheBxIKAAE",
            authDomain: "webibis-auth.firebaseapp.com",
            projectId: "webibis-auth",
            storageBucket: "webibis-auth.firebasestorage.app",
            messagingSenderId: "31094009805",
            appId: "1:31094009805:web:c53f5651b82c46871f5e84"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db; // Global access
        window.updateDoc = updateDoc;
        window.arrayUnion = arrayUnion;
        window.doc = doc;
        window.onSnapshot = onSnapshot;
    </script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; padding: 20px; }
        .nav-menu { background: #34495e; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; }
        .nav-menu a { color: white; text-decoration: none; font-weight: bold; padding: 5px 10px; border-radius: 4px; }
        .nav-menu a:hover, .nav-menu a.active { background: #1abc9c; }
        
        .container { max-width: 900px; background: #fff; margin: auto; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .stats-box { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-card { flex: 1; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #ddd; text-align: center; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        
        /* Chat Modal */
        #chatModal { display:none; position:fixed; right:20px; bottom:20px; width:320px; background:white; border-radius:10px; box-shadow:0 5px 20px rgba(0,0,0,0.3); z-index:1000; overflow:hidden; }
        .chat-header { background:#34495e; color:white; padding:10px; display:flex; justify-content:space-between; }
        #chatMessages { height:250px; overflow-y:auto; padding:10px; background:#f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-menu">
        <a href="admin.html" id="nav-dashboard">Dashboard</a>
        <a href="stats.html" id="nav-stats">Statistics</a>
        <a href="manage-icons.html" id="nav-manage">Manage Icons</a>
    </div>

    <h2>User Statistics 👥</h2>
    <div class="stats-box">
        <div class="stat-card">Total Signups: <br><span id="totalUsers" style="color:#1abc9c; font-size: 1.5rem;">0</span></div>
        <div class="stat-card">Currently Active: <br><span id="activeUsers" style="color:#e67e22; font-size: 1.5rem;">0</span></div>
    </div>
    
    <table>
        <thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Action</th></tr></thead>
        <tbody id="userList"></tbody>
    </table>
</div>

<div id="chatModal">
    <div class="chat-header">
        <span id="chatTitle">Support Chat</span>
        <button onclick="document.getElementById('chatModal').style.display='none'">X</button>
    </div>
    <div id="chatMessages"></div>
    <div style="padding:10px; display:flex;">
        <input type="text" id="replyInput" style="flex:1" placeholder="Type reply...">
        <button onclick="sendReply()">Send</button>
    </div>
</div>

<script>
    const SERVER_URL = 'https://webibis-icon-pack.onrender.com';
    let currentChatEmail = '';

    // Navigation highlight
    const path = window.location.pathname;
    if (path.includes('admin.html')) document.getElementById('nav-dashboard').classList.add('active');
    else if (path.includes('stats.html')) document.getElementById('nav-stats').classList.add('active');

    async function loadUserStats() {
        const response = await fetch(`${SERVER_URL}/api/users/stats`);
        const result = await response.json();
        if (result.success) {
            document.getElementById('totalUsers').innerText = result.totalCount;
            document.getElementById('activeUsers').innerText = result.activeCount;
            document.getElementById('userList').innerHTML = result.users.map(user => `
                <tr>
                    <td>${user.name}</td>
                    <td>${user.email}</td>
                    <td>● ${user.is_active ? 'Active' : 'Offline'}</td>
                    <td><button onclick="openChat('${user.email}')">Chat</button></td>
                </tr>
            `).join('');
        }
    }

    function openChat(email) {
        currentChatEmail = email;
        document.getElementById('chatTitle').innerText = "Chat: " + email;
        document.getElementById('chatModal').style.display = 'block';
        
        // Listen to Firestore
        onSnapshot(doc(db, "chats", email), (doc) => {
            const data = doc.data();
            if (data && data.messages) {
                document.getElementById('chatMessages').innerHTML = data.messages.map(m => 
                    `<p><b>${m.sender}:</b> ${m.text}</p>`
                ).join('');
            }
        });
    }

    async function sendReply() {
        const text = document.getElementById('replyInput').value;
        if (!text) return;
        await updateDoc(doc(db, "chats", currentChatEmail), {
            messages: arrayUnion({ sender: 'Admin', text: text, time: new Date().toISOString() })
        });
        document.getElementById('replyInput').value = '';
    }

    loadUserStats();
</script>
</body>
</html>
